<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>99 Bet - Admin Panel</title>
    <style>
        body { background-color: #121212; color: white; font-family: Arial, sans-serif; margin: 0; padding-bottom: 50px; }
        .navbar { background-color: #ff0000; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffcc00; }
        .logo { color: white; font-size: 22px; font-weight: bold; text-decoration: none; }
        .admin-badge { background-color: #121212; color: #ffcc00; padding: 5px 10px; border-radius: 5px; font-size: 14px; font-weight: bold;}
        .stats-container { padding: 20px; text-align: center; }
        .profit-box { background-color: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #ffcc00; box-shadow: 0px 4px 10px rgba(255, 204, 0, 0.2); }
        .profit-box h3 { margin: 0; color: #aaa; font-size: 16px; }
        .profit-amount { font-size: 32px; color: #00ff00; font-weight: bold; margin-top: 10px; }
        h2 { text-align: center; color: #ffcc00; margin-top: 30px; border-bottom: 1px solid #333; padding-bottom: 10px; width: 90%; margin-left: auto; margin-right: auto;}
        .data-container { padding: 10px 20px; }
        .card { background-color: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid #ffcc00; }
        .user-card { border-left-color: #007bff; }
        .deposit-card { border-left-color: #28a745; }
        .card-detail { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px;}
        .card-detail span:first-child { color: #aaa; }
        .card-detail span:last-child { font-weight: bold; }
        .user-email { color: #ffcc00; font-size: 16px; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px;}
        .highlight { color: #00ff00 !important; font-size: 16px;}
        .info-box { background-color: #333; padding: 10px; border-radius: 5px; margin: 10px 0; border-left: 3px solid #007bff; }
        .info-box div { margin-bottom: 5px; font-size: 13px; }
        .info-box span { color: #fff; font-weight: normal; }
        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .approve-btn { flex: 1; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;}
        .reject-btn { flex: 1; padding: 10px; background-color: #dc3545; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;}
        .no-data { text-align: center; color: #888; font-style: italic; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="dashboard.html" class="logo">99 Bet | ADMIN</a>
        <div class="admin-badge">Control Room</div>
    </div>

    <div class="stats-container">
        <div class="profit-box">
            <h3>Total Admin Profit (5% Fees)</h3>
            <div class="profit-amount">💰 <span id="totalProfitDisplay">0</span></div>
        </div>
    </div>

    <h2 style="color: #28a745;">Pending Deposits</h2>
    <div class="data-container" id="depositsList"><div class="no-data">Loading deposits...</div></div>

    <h2>Pending Withdrawals</h2>
    <div class="data-container" id="requestsList"><div class="no-data">Loading requests...</div></div>

    <h2 style="color: #007bff;">All Registered Users</h2>
    <div class="data-container" id="usersList"><div class="no-data">Loading users...</div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, where, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZx7Oxr6BrmWG0l_jH15vhIckaE6LEfnw",
            authDomain: "bet-99.firebaseapp.com",
            projectId: "bet-99",
            storageBucket: "bet-99.firebasestorage.app",
            messagingSenderId: "124081153342",
            appId: "1:124081153342:web:44ca17f215901a0eaab86f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const depositsList = document.getElementById('depositsList');
        const requestsList = document.getElementById('requestsList');
        const usersList = document.getElementById('usersList');
        const totalProfitDisplay = document.getElementById('totalProfitDisplay');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loadDeposits();
                loadWithdrawalsAndProfit();
                loadAllUsers();
            } else {
                window.location.href = "index.html";
            }
        });

        async function loadDeposits() {
            const pendingSnap = await getDocs(query(collection(db, "deposits"), where("status", "==", "Pending")));
            depositsList.innerHTML = ""; 
            if (pendingSnap.empty) return depositsList.innerHTML = '<div class="no-data">No pending deposits.</div>';

            pendingSnap.forEach(requestDoc => {
                const data = requestDoc.data();
                const reqId = requestDoc.id;
                const card = document.createElement('div');
                card.className = 'card deposit-card';
                card.innerHTML = `
                    <div class="user-email">📧 ${data.userEmail || 'User'}</div>
                    <div class="card-detail"><span>Amount:</span> <span class="highlight">${data.amount} coins</span></div>
                    <div class="card-detail"><span>Method:</span> <span>${data.method}</span></div>
                    <div class="card-detail"><span>TID:</span> <span style="color:#ffcc00;">${data.transactionId}</span></div>
                    <div class="action-btns">
                        <button class="approve-btn" onclick="handleDeposit('${reqId}', 'Approved', ${data.amount}, '${data.userId}')">Approve</button>
                        <button class="reject-btn" onclick="handleDeposit('${reqId}', 'Rejected', ${data.amount}, '${data.userId}')">Reject</button>
                    </div>
                `;
                depositsList.appendChild(card);
            });
        }

        window.handleDeposit = async function(reqId, action, amount, userId) {
            if (!confirm(`Are you sure you want to ${action} this deposit?`)) return;
            await updateDoc(doc(db, "deposits", reqId), { status: action });
            if (action === "Approved") {
                const userRef = doc(db, "users", userId);
                const userSnap = await getDoc(userRef);
                await updateDoc(userRef, { 
                    walletBalance: (userSnap.data().walletBalance || 0) + amount,
                    totalDeposits: (userSnap.data().totalDeposits || 0) + amount,
                    wageringRequired: (userSnap.data().wageringRequired || 0) + amount
                });
            }
            loadDeposits(); loadAllUsers();
        }

        async function loadWithdrawalsAndProfit() {
            const allSnap = await getDocs(collection(db, "withdrawals"));
            let totalProfit = 0;
            allSnap.forEach(doc => { if(doc.data().status !== "Rejected" && doc.data().adminFee) totalProfit += doc.data().adminFee; });
            totalProfitDisplay.innerText = totalProfit;

            const pendingSnap = await getDocs(query(collection(db, "withdrawals"), where("status", "==", "Pending")));
            requestsList.innerHTML = ""; 
            if (pendingSnap.empty) return requestsList.innerHTML = '<div class="no-data">No pending requests!</div>';

            pendingSnap.forEach(requestDoc => {
                const data = requestDoc.data();
                const reqId = requestDoc.id;
                const card = document.createElement('div');
                card.className = 'card';
                
                // Naya Hissa: Yahan Admin ko user ki bank details nazar aayengi
                card.innerHTML = `
                    <div class="card-detail"><span>User ID:</span> <span>${data.userId.substring(0, 8)}...</span></div>
                    
                    <div class="info-box">
                        <div><strong style="color:#007bff;">Transfer Details:</strong></div>
                        <div>Name: <span>${data.accountName || 'N/A'}</span></div>
                        <div>Account No: <span style="color:#ffcc00; font-weight:bold;">${data.accountNumber || 'N/A'}</span></div>
                        <div>CNIC: <span>${data.cnic || 'N/A'}</span></div>
                    </div>

                    <div class="card-detail"><span>Requested:</span> <span>${data.requestAmount} coins</span></div>
                    <div class="card-detail"><span>Admin Fee Cut:</span> <span style="color: #00ff00;">+${data.adminFee} coins</span></div>
                    <div class="card-detail"><span>Send Exactly:</span> <span class="highlight">${data.finalAmount}</span></div>
                    
                    <div class="action-btns">
                        <button class="approve-btn" onclick="handleWithdraw('${reqId}', 'Approved', ${data.requestAmount}, '${data.userId}')">Approve</button>
                        <button class="reject-btn" onclick="handleWithdraw('${reqId}', 'Rejected', ${data.requestAmount}, '${data.userId}')">Reject</button>
                    </div>
                `;
                requestsList.appendChild(card);
            });
        }

        window.handleWithdraw = async function(reqId, action, amount, userId) {
            if (!confirm(`Are you sure you want to ${action} this request?`)) return;
            await updateDoc(doc(db, "withdrawals", reqId), { status: action });
            if (action === "Rejected") {
                const userRef = doc(db, "users", userId);
                const userSnap = await getDoc(userRef);
                await updateDoc(userRef, { walletBalance: (userSnap.data().walletBalance || 0) + amount });
            }
            loadWithdrawalsAndProfit(); loadAllUsers();
        }

        async function loadAllUsers() {
            const usersSnap = await getDocs(collection(db, "users"));
            usersList.innerHTML = "";
            if (usersSnap.empty) return usersList.innerHTML = '<div class="no-data">No users yet.</div>';

            usersSnap.forEach(userDoc => {
                const data = userDoc.data();
                const card = document.createElement('div');
                card.className = 'card user-card';
                card.innerHTML = `
                    <div class="user-email" style="color: #007bff;">📧 ${data.email || 'Unknown User'}</div>
                    <div class="card-detail"><span>Wallet Balance:</span> <span style="color: #ffcc00;">${data.walletBalance} coins</span></div>
                    <div class="card-detail"><span>Wagering Target Left:</span> <span style="color: #ff4444;">${data.wageringRequired || 0}</span></div>
                `;
                usersList.appendChild(card);
            });
        }
    </script>
</body>
</html>
