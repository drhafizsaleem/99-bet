<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>99 Bet - Deposit</title>
    <style>
        body {
            background-color: #121212; color: white; font-family: Arial, sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center;
        }
        /* Navbar */
        .navbar {
            width: 100%; background-color: #1e1e1e; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box; border-bottom: 2px solid #ffcc00;
        }
        .logo { color: #ffcc00; font-size: 24px; font-weight: bold; text-decoration: none; }
        
        /* Deposit Card */
        .deposit-card {
            background-color: #1e1e1e; width: 85%; max-width: 400px;
            margin-top: 40px; padding: 25px; border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
        }
        h2 { color: #28a745; text-align: center; margin-top: 0; }
        
        /* Admin Bank Details Box */
        .account-box {
            background-color: #2a2a2a; padding: 15px; border-radius: 8px;
            margin-bottom: 20px; border-left: 4px solid #ffcc00; font-size: 14px;
        }
        .account-box p { margin: 5px 0; color: #ccc; }
        .highlight { color: #ffcc00; font-weight: bold; font-size: 16px; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; color: #ccc; font-size: 14px; }
        input, select {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background-color: #333; color: white; font-size: 16px; box-sizing: border-box;
        }
        
        button {
            width: 100%; padding: 15px; border: none; border-radius: 8px;
            background-color: #28a745; color: white; font-weight: bold;
            font-size: 16px; cursor: pointer; text-transform: uppercase; margin-top: 10px;
        }
        button:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        
        .back-btn { text-align: center; margin-top: 20px; }
        .back-btn a { color: #ffcc00; text-decoration: none; }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="dashboard.html" class="logo">99 Bet</a>
        <div style="font-weight: bold;">Add Funds</div>
    </div>

    <div class="deposit-card">
        <h2>Deposit Money</h2>
        
        <div class="account-box">
            <p>Pehle is account par paise bhejein, phir neechay form fill karein:</p>
            <p>Bank / Wallet: <span class="highlight">JazzCash</span></p>
            <p>Account Title: <span class="highlight">Muhammad Usama</span></p>
            <p>Account Number: <span class="highlight">0324-6767582</span></p>
        </div>

        <div class="input-group">
            <label>Payment Method</label>
            <select id="paymentMethod">
                <option value="Easypaisa">Easypaisa</option>
                <option value="JazzCash">JazzCash</option>
                <option value="Bank Transfer">Bank Transfer</option>
            </select>
        </div>

        <div class="input-group">
            <label>Amount Sent (PKR / Coins)</label>
            <input type="number" id="depositAmount" placeholder="Example: 1000">
        </div>

        <div class="input-group">
            <label>Transaction ID (TID)</label>
            <input type="text" id="transactionId" placeholder="Enter 11-digit TID">
        </div>

        <button id="submitDepositBtn">Submit Request</button>
        
        <div class="back-btn">
            <a href="dashboard.html">← Back to Dashboard</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZx7Oxr6BrmWG0l_jH15vhIckaE6LEfnw",
            authDomain: "bet-99.firebaseapp.com",
            projectId: "bet-99",
            storageBucket: "bet-99.firebasestorage.app",
            messagingSenderId: "124081153342",
            appId: "1:124081153342:web:44ca17f215901a0eaab86f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserId = null;
        let userEmail = "";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserId = user.uid;
                // User ki details nikalna taake admin panel mein email show ho sake
                const docSnap = await getDoc(doc(db, "users", currentUserId));
                if (docSnap.exists()) {
                    userEmail = docSnap.data().email;
                }
            } else {
                window.location.href = "index.html";
            }
        });

        const submitBtn = document.getElementById('submitDepositBtn');
        
        submitBtn.addEventListener('click', async () => {
            const method = document.getElementById('paymentMethod').value;
            const amount = parseInt(document.getElementById('depositAmount').value);
            const tid = document.getElementById('transactionId').value.trim();

            if (!amount || amount < 100) {
                alert("Kam az kam 100 ka deposit karna zaroori hai!");
                return;
            }
            if (!tid) {
                alert("Transaction ID (TID) likhna zaroori hai!");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "Submitting...";

            try {
                // Database k 'deposits' table mein request save karna
                await addDoc(collection(db, "deposits"), {
                    userId: currentUserId,
                    userEmail: userEmail,
                    amount: amount,
                    method: method,
                    transactionId: tid,
                    status: "Pending",
                    timestamp: new Date()
                });

                alert("Deposit Request lag gayi hai! Admin verify kar ke balance add kar dega.");
                window.location.href = "dashboard.html";

            } catch (error) {
                alert("Error: " + error.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Request";
            }
        });
    </script>
</body>
</html>
