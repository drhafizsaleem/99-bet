<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>99 Bet - Dashboard</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* Navbar Design */
        .navbar {
            width: 100%;
            background-color: #1e1e1e;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border-bottom: 2px solid #ffcc00;
        }
        .logo { color: #ffcc00; font-size: 24px; font-weight: bold; }
        .wallet { background-color: #333; padding: 8px 15px; border-radius: 20px; font-weight: bold; display: flex; align-items: center;}
        
        /* Spin Wheel Design */
        .game-container {
            margin-top: 50px;
            text-align: center;
            position: relative;
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ffcc00;
            z-index: 10;
        }
        .wheel {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 5px solid #333;
            background: conic-gradient(
                #1e1e1e 0deg 90deg, 
                #ffcc00 90deg 180deg, 
                #333 180deg 270deg, 
                #ffcc00 270deg 360deg
            );
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.1, 1);
        }
        
        .controls { margin-top: 30px; width: 80%; max-width: 300px; text-align: center; }
        .bet-input {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background-color: #333; color: white; font-size: 16px; text-align: center;
            margin-bottom: 10px; box-sizing: border-box;
        }
        .spin-btn {
            width: 100%; padding: 15px; border: none; border-radius: 8px;
            background-color: #ffcc00; color: black; font-weight: bold;
            font-size: 18px; cursor: pointer; text-transform: uppercase;
        }
        .spin-btn:disabled { background-color: #665200; cursor: not-allowed; }
        .status-msg { margin-top: 15px; font-size: 18px; color: #ffcc00; height: 25px; font-weight: bold;}
    </style>
</head>
<body>

    <!-- Header / Navbar with Demo Button -->
        <div class="navbar">
        <div class="logo">99 Bet</div>
        <div class="wallet" style="display: flex; align-items: center;">
            💰 <span id="balanceDisplay">...</span>
            <button id="demoDepositBtn" style="padding: 5px 10px; margin-left: 10px; border-radius: 5px; border: none; font-size: 12px; background: #28a745; color: white; cursor: pointer;">+1000</button>
            <a href="withdraw.html" style="padding: 5px 10px; margin-left: 10px; border-radius: 5px; background: #ff4444; color: white; text-decoration: none; font-size: 12px; font-weight: bold; cursor: pointer;">Withdraw</a>
        </div>
    </div>


    <!-- Game Area -->
    <div class="game-container">
        <div class="pointer"></div>
        <div class="wheel" id="wheelElement"></div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <input type="number" id="betAmount" class="bet-input" placeholder="Enter Bet Amount">
        <button id="spinBtn" class="spin-btn">Spin Now</button>
        <div class="status-msg" id="statusMessage">Place your bet!</div>
    </div>

    <!-- Firebase Connection & Game Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZx7Oxr6BrmWG0l_jH15vhIckaE6LEfnw",
            authDomain: "bet-99.firebaseapp.com",
            projectId: "bet-99",
            storageBucket: "bet-99.firebasestorage.app",
            messagingSenderId: "124081153342",
            appId: "1:124081153342:web:44ca17f215901a0eaab86f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserId = null;
        let currentRotation = 0; 
        
        const balanceDisplay = document.getElementById('balanceDisplay');
        const wheel = document.getElementById('wheelElement');
        const spinBtn = document.getElementById('spinBtn');
        const statusMessage = document.getElementById('statusMessage');
        const demoDepositBtn = document.getElementById('demoDepositBtn');
        const betInput = document.getElementById('betAmount');

        // Tumhari Mathematical Probabilities (The House Edge)
        const wheelPrizes = [
            { name: "Loss (0x)", multiplier: 0, weight: 80 },    
            { name: "Double (2x)", multiplier: 2, weight: 19 },  
            { name: "Mega (5x)", multiplier: 5, weight: 0.7 },   
            { name: "Jackpot (10x)", multiplier: 10, weight: 0.3 } 
        ];

        function getSpinResult() {
            let randomNum = Math.random() * 100;
            for (let i = 0; i < wheelPrizes.length; i++) {
                if (randomNum < wheelPrizes[i].weight) {
                    return wheelPrizes[i];
                }
                randomNum -= wheelPrizes[i].weight;
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserId = user.uid;
                const docSnap = await getDoc(doc(db, "users", currentUserId));
                if (docSnap.exists()) {
                    balanceDisplay.innerText = docSnap.data().walletBalance;
                }
            } else {
                window.location.href = "index.html";
            }
        });

        // Demo Deposit Logic
        demoDepositBtn.addEventListener('click', async () => {
            demoDepositBtn.disabled = true;
            const userRef = doc(db, "users", currentUserId);
            const docSnap = await getDoc(userRef);
            const currentBalance = docSnap.data().walletBalance || 0;
            const currentTotalDeposits = docSnap.data().totalDeposits || 0;
            const currentWagering = docSnap.data().wageringRequired || 0;

            await updateDoc(userRef, {
                walletBalance: currentBalance + 1000,
                totalDeposits: currentTotalDeposits + 1000,
                wageringRequired: currentWagering + 1000 
            });
            balanceDisplay.innerText = currentBalance + 1000;
            alert("1000 Demo Coins deposited! Ab bet lagao.");
            demoDepositBtn.disabled = false;
        });

        // Asli Game Logic
        spinBtn.addEventListener('click', async () => {
            const betAmount = parseInt(betInput.value);

            if (isNaN(betAmount) || betAmount < 10) {
                alert("Kam az kam 10 coins ki bet lagani hogi!");
                return;
            }

            const userRef = doc(db, "users", currentUserId);
            const docSnap = await getDoc(userRef);
            const userData = docSnap.data();

            if (userData.walletBalance < betAmount) {
                alert("Wallet mein balance kam hai! Pehle deposit karein.");
                return;
            }

            // Lock UI & Deduct Balance
            spinBtn.disabled = true;
            statusMessage.innerText = "Spinning...";
            statusMessage.style.color = "#ffcc00";

            let newWagering = userData.wageringRequired - betAmount;
            if (newWagering < 0) newWagering = 0;

            await updateDoc(userRef, {
                walletBalance: userData.walletBalance - betAmount,
                wageringRequired: newWagering
            });
            balanceDisplay.innerText = userData.walletBalance - betAmount;

            // Result aur Animation
            const result = getSpinResult();
            const spinDegrees = Math.floor(Math.random() * 360) + 1440; 
            currentRotation += spinDegrees;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(async () => {
                if (result.multiplier > 0) {
                    const winAmount = betAmount * result.multiplier;
                    statusMessage.innerText = `Mubarak! You won ${winAmount}!`;
                    statusMessage.style.color = "#00ff00";

                    const freshSnap = await getDoc(userRef);
                    await updateDoc(userRef, {
                        walletBalance: freshSnap.data().walletBalance + winAmount,
                        totalWinnings: (freshSnap.data().totalWinnings || 0) + winAmount
                    });
                    balanceDisplay.innerText = freshSnap.data().walletBalance + winAmount;
                } else {
                    statusMessage.innerText = "Oops! You lost.";
                    statusMessage.style.color = "#ff4444";
                }
                
                spinBtn.disabled = false;
            }, 4000);
        });
    </script>
</body>
</html>
