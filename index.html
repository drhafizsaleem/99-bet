    <script type="module">
        // Firebase SDKs import kar rahe hain
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Tumhari 99 Bet ki Asli Config Keys
        const firebaseConfig = {
            apiKey: "AIzaSyCZx7Oxr6BrmWG0l_jH15vhIckaE6LEfnw",
            authDomain: "bet-99.firebaseapp.com",
            projectId: "bet-99",
            storageBucket: "bet-99.firebasestorage.app",
            messagingSenderId: "124081153342",
            appId: "1:124081153342:web:44ca17f215901a0eaab86f"
        };

        // Firebase Start 
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // HTML elements ko control mein lena
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');

        // --- SIGN UP LOGIC (Naya Account Banana) ---
        signupBtn.addEventListener('click', async () => {
            const email = emailInput.value;
            const password = passwordInput.value;

            if(!email || !password) {
                alert("Bhai, pehle Email aur Password toh likho!");
                return;
            }

            try {
                // 1. User ka Auth account bnao
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Database mein User ka Wallet aur Profile bnao
                await setDoc(doc(db, "users", user.uid), {
                    email: email,
                    walletBalance: 0,
                    wageringRequired: 0, // Withdrawal condition
                    totalDeposits: 0,
                    totalWinnings: 0,
                    role: "user",
                    createdAt: new Date()
                });

                alert("Account Ban Gaya! 99 Bet mein Khushamdeed.");
                
            } catch (error) {
                alert("Error: " + error.message);
            }
        });

        // --- LOGIN LOGIC (Purane Account se Login Karna) ---
        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value;
            const password = passwordInput.value;

            if(!email || !password) {
                alert("Email aur Password dono zaroori hain.");
                return;
            }

            try {
                // Firebase check karega k details theek hain ya nahi
                await signInWithEmailAndPassword(auth, email, password);
                alert("Login Successful! Ab hum Dashboard par jayenge.");
                
                // Note: Agle step mein hum yahan dashboard.html par redirect karenge
                // window.location.href = "dashboard.html"; 

            } catch (error) {
                alert("Galat Email ya Password. Dobara try karo!");
            }
        });
                </script>
